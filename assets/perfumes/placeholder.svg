<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 920" role="img" aria-labelledby="title desc">
  <title id="title">ScentMatch perfume image placeholder</title>
  <desc id="desc">A premium perfume bottle placeholder for fragrances without a licensed product photo.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a1514"/>
      <stop offset="0.48" stop-color="#0b0b0b"/>
      <stop offset="1" stop-color="#233331"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7e5" stop-opacity="0.4"/>
      <stop offset="0.3" stop-color="#c9a66b" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#4a151e" stop-opacity="0.86"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0d99d"/>
      <stop offset="1" stop-color="#9a7437"/>
    </linearGradient>
  </defs>
  <rect width="720" height="920" fill="url(#bg)"/>
  <circle cx="595" cy="150" r="220" fill="#6ba7a5" opacity="0.12"/>
  <circle cx="122" cy="780" r="240" fill="#c9a66b" opacity="0.12"/>
  <ellipse cx="360" cy="792" rx="210" ry="56" fill="#000" opacity="0.36"/>
  <rect x="302" y="132" width="116" height="70" rx="10" fill="#111" stroke="#c9a66b" stroke-opacity="0.36" stroke-width="4"/>
  <rect x="273" y="188" width="174" height="44" rx="12" fill="url(#gold)"/>
  <rect x="183" y="230" width="354" height="510" rx="48" fill="url(#glass)" stroke="#f4efe7" stroke-opacity="0.22" stroke-width="5"/>
  <path d="M218 255c38 26 74 36 118 33" fill="none" stroke="#fff" stroke-opacity="0.35" stroke-width="12" stroke-linecap="round"/>
  <rect x="242" y="408" width="236" height="170" rx="18" fill="#080808" fill-opacity="0.58" stroke="#c9a66b" stroke-opacity="0.56" stroke-width="4"/>
  <text x="360" y="478" text-anchor="middle" fill="#e1c88e" font-family="Georgia, serif" font-size="48" font-weight="700">Scent</text>
  <text x="360" y="532" text-anchor="middle" fill="#f4efe7" font-family="Arial, sans-serif" font-size="38" font-weight="700">MATCH</text>
  <text x="360" y="628" text-anchor="middle" fill="#d8c3a5" font-family="Arial, sans-serif" font-size="22">Add licensed photo</text>
</svg>
